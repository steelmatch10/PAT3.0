<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAT 3.0 — Catalogue</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    /* ── Toolbar ── */
    .cat-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .cat-toolbar input,
    .cat-toolbar select {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: clamp(14px, 1.1vw, 16px);
      padding: 9px 12px;
      outline: none;
    }
    .cat-toolbar input:focus,
    .cat-toolbar select:focus { border-color: var(--brand); }
    #searchBox { min-width: 240px; flex: 1; }
    .cat-toolbar-right { display: flex; gap: 8px; margin-left: auto; }

    /* ── Cards grid (playing-card layout) ── */
    #cards {
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .cat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      transition: border-color .15s;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .cat-card:hover { border-color: var(--brand); }

    .cat-card-header {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cat-addr-main {
      font-size: clamp(15px, 1.3vw, 18px);
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .cat-addr-locality {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .cat-addr-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .cat-addr-meta a { color: var(--brand); }

    /* KPI + capital required grouped section */
    .cat-kpi-group {
      margin-top: 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cat-kpis {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .cat-kpis .badge {
      font-size: 12px;
      padding: 4px 9px;
    }
    .cat-capital {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .cat-capital-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .cat-capital-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .cat-no-scenarios {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Pin / select ── */
    .cat-card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .cat-select { cursor: pointer; accent-color: var(--brand); }
    .cat-pin-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      padding: 2px 7px;
      border-radius: 5px;
      background: rgba(110,168,254,.15);
      color: var(--brand);
    }
    .cat-pin-badge.investor {
      background: rgba(245,197,66,.15);
      color: var(--okay);
    }
    .cat-card-pinned {
      border-color: var(--brand);
    }
    .tbl-row-pinned td:first-child { border-left: 2px solid var(--brand); }

    .cat-card-footer {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
    }

    .cat-empty {
      text-align: center;
      color: var(--muted);
      padding: 60px 0;
      font-size: 14px;
    }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      gap: 2px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      flex-shrink: 0;
    }
    .view-toggle button {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background .12s, color .12s;
    }
    .view-toggle button.active {
      background: var(--panel-2);
      color: var(--text);
    }

    /* ── Table view ── */
    #tableView {
      display: none;
      width: 100%;
      overflow-x: auto;
    }
    #tableView table {
      width: 100%;
      border-collapse: collapse;
      font-size: clamp(13px, 1vw, 15px);
    }
    #tableView thead th {
      text-align: left;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
      user-select: none;
    }
    #tableView thead th.sortable {
      cursor: pointer;
    }
    #tableView thead th.sortable:hover { color: var(--text); }
    #tableView thead th .sort-icon {
      display: inline-block;
      margin-left: 4px;
      opacity: .4;
      font-size: 10px;
    }
    #tableView thead th.sort-asc .sort-icon,
    #tableView thead th.sort-desc .sort-icon { opacity: 1; color: var(--brand); }
    /* KPI header cell — position:relative so dropdown anchors to it */
    #thKpi { position: relative; cursor: pointer; }
    #thKpi:hover { color: var(--text); }

    /* Filter indicator dot shown when a KPI filter is active */
    #kpiActiveIndicator {
      display: none;
      color: var(--brand);
      margin-left: 4px;
      font-size: 10px;
    }
    #kpiActiveIndicator.visible { display: inline; }

    /* Dropdown panel — absolutely positioned, zero height impact on header row */
    #kpiDropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      z-index: 50;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 0;
      min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      white-space: nowrap;
    }
    #kpiDropdown.open { display: block; }
    #kpiDropdown button {
      display: block;
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      padding: 8px 14px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
    }
    #kpiDropdown button:hover { background: var(--panel-2); }
    #kpiDropdown button.selected { color: var(--brand); font-weight: 700; }

    /* Status line below the table */
    .tbl-sort-status {
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      min-height: 18px;
    }
    .tbl-sort-status span { color: var(--brand); font-weight: 600; }
    #tableView tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    #tableView tbody tr:hover { background: var(--panel); }
    #tableView tbody td {
      padding: 10px 14px;
      color: var(--text);
      vertical-align: middle;
    }
    #tableView .tbl-street { font-weight: 700; }
    #tableView .tbl-locality { font-size: .85em; color: var(--muted); }
    #tableView .tbl-kpis { display: flex; gap: 6px; flex-wrap: nowrap; align-items: center; }
    #tableView .badge { font-size: 12px; padding: 3px 8px; white-space: nowrap; }
    #tableView .tbl-invest { font-weight: 700; white-space: nowrap; }
    #tableView .tbl-open { white-space: nowrap; }

    /* ── Spinner ── */
    #catalogueSpinner {
      display: none;
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 14px;
    }

    /* Hide founder-only elements immediately for investors — prevents flash */
    .founder-only-hide { display: none !important; }

    /* ── Role badge (nav) ── */
    .role-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--chip);
      color: var(--brand);
    }
    .role-badge.investor {
      background: rgba(245,197,66,.12);
      color: var(--okay);
    }
  </style>
</head>
<body>
  <div class="container full">
    <header class="header">
      <div class="brand">
        <div class="logo"></div>
        <h1>Catalogue</h1>
      </div>
      <nav class="nav" style="display:flex;align-items:center;gap:12px;">
        <span id="userEmail" style="font-size:13px;color:var(--muted);"></span>
        <span id="roleBadge" class="role-badge"></span>
        <a class="btn founder-only" href="GRASP.html">GRASP</a>
        <a class="btn founder-only" href="FRAT.html">FRAT</a>
        <a class="btn founder-only" href="Team.html">Team</a>
        <a class="btn" href="index.html">Home</a>
        <button class="btn" id="logoutBtn">Sign out</button>
      </nav>
    </header>

    <main>
      <div class="cat-toolbar">
        <input id="searchBox" type="text" placeholder="Search by address…" />
        <select id="moduleFilter">
          <option value="">All Modules</option>
          <option value="GRASP">GRASP</option>
          <option value="FRAT">FRAT</option>
        </select>
        <div class="view-toggle">
          <button id="viewList" class="active">Grid</button>
          <button id="viewTable">Table</button>
        </div>
        <div class="cat-toolbar-right founder-only">
          <button class="btn" id="pinBtn">Pin / Unpin</button>
          <select id="exportSelect">
            <option value="json">Export: JSON</option>
          </select>
          <button class="btn" id="exportBtn">Export</button>
        </div>
      </div>

      <div id="catalogueSpinner">Loading properties…</div>
      <div id="cards" style="display:none;"></div>
      <div id="tableView">
        <table>
          <thead>
            <tr id="tblSortRow">
              <th class="sortable" data-col="address">Address <span class="sort-icon">↕</span></th>
              <th class="sortable" data-col="scenarios">Scenarios <span class="sort-icon">↕</span></th>
              <th id="thKpi">
                Best KPIs <span id="kpiActiveIndicator">⊙</span>
                <div id="kpiDropdown">
                  <button data-val="">All KPIs</button>
                  <button data-val="coc">CoC ≥ 5%</button>
                  <button data-val="cap">Cap ≥ 8%</button>
                  <button data-val="dscr">DSCR ≥ 1.2</button>
                  <button data-val="roi">ROI ≥ 20%</button>
                </div>
              </th>
              <th class="sortable" data-col="investment">Capital <span class="sort-icon">↕</span></th>
              <th class="sortable" data-col="updated">Updated <span class="sort-icon">↕</span></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div class="tbl-sort-status" id="tblSortStatus"></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-config.js"></script>
  <script src="assets/supabase-client.js"></script>
  <script src="assets/app.js"></script>
  <script>
    // Runs before catalogue.js — sets nav state and applies role hiding synchronously
    // so founder-only elements never flash for investors.
    (async () => {
      window._patCurrentMember = null;

      const user = await initAuth();
      if (!user) return;
      const member = await getCurrentMember();
      document.getElementById('userEmail').textContent = user.email;
      const badge = document.getElementById('roleBadge');
      badge.textContent = member?.global_role ?? 'member';
      if (member?.global_role === 'investor') {
        badge.classList.add('investor');
        document.querySelectorAll('.founder-only').forEach(el => el.style.display = 'none');
      }
      document.getElementById('logoutBtn').addEventListener('click', patSignOut);
      window._patRole = member?.global_role ?? null;
      initProfileWidget(user, member);
    })();
  </script>
  <script src="assets/catalogue.js"></script>
</body>
</html>
