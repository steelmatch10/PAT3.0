<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAT 3.0 — Verify It's You</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .login-brand .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--brand), #89b4ff);
      box-shadow: 0 8px 20px rgba(110,168,254,.2);
      flex-shrink: 0;
    }
    .login-brand h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }
    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .login-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .form-group input {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 22px;
      letter-spacing: .3em;
      text-align: center;
      padding: 10px 12px;
      outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus { border-color: var(--brand); }
    .btn-primary {
      width: 100%;
      background: var(--brand);
      color: #0e1220;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      padding: 12px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .login-error {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px;
      color: #f87171;
      font-size: 14px;
      padding: 10px 12px;
      margin-top: 12px;
      display: none;
    }
    .login-error.visible { display: block; }
    .login-footer {
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }
    .login-footer a { color: var(--brand); cursor: pointer; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="logo"></div>
        <h1>PAT 3.0</h1>
      </div>
      <div class="login-title">Verify it's you</div>
      <div class="login-subtitle">This account has two-factor authentication enabled. Enter the 6-digit code from your authenticator app to continue.</div>

      <form id="challengeForm" novalidate>
        <div class="form-group">
          <label for="code">Authentication code</label>
          <input type="text" id="code" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" placeholder="000000" autofocus required />
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">Verify</button>
        <div class="login-error" id="challengeError"></div>
      </form>

      <div class="login-footer">
        <a id="signOutLink">Sign out</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-config.js"></script>
  <script src="assets/supabase-client.js"></script>
  <script>
    (async () => {
      const session = await patGetSession();
      if (!session) { window.location.href = 'login.html'; return; }

      const { data: aal } = await supabaseClient.auth.mfa.getAuthenticatorAssuranceLevel();
      if (aal && aal.nextLevel !== 'aal2') {
        // Already at the required level (or no factor enrolled) — nothing to challenge.
        const params = new URLSearchParams(window.location.search);
        window.location.href = params.get('returnTo') || 'index.html';
        return;
      }

      const form      = document.getElementById('challengeForm');
      const codeEl     = document.getElementById('code');
      const submitBtn  = document.getElementById('submitBtn');
      const errorEl    = document.getElementById('challengeError');
      const signOutLink = document.getElementById('signOutLink');

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add('visible');
      }

      signOutLink.addEventListener('click', patSignOut);

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.classList.remove('visible');
        const code = codeEl.value.trim();
        if (!/^\d{6}$/.test(code)) { showError('Enter the 6-digit code from your authenticator app.'); return; }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Verifying…';

        const { data: factorsData, error: factorsError } = await patMfaListFactors();
        const factor = factorsData?.totp?.find(f => f.status === 'verified');
        if (factorsError || !factor) {
          showError('No verified authenticator found on this account.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Verify';
          return;
        }

        const { data: challenge, error: challengeError } = await patMfaChallenge(factor.id);
        if (challengeError) {
          showError(challengeError.message);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Verify';
          return;
        }

        const { error: verifyError } = await patMfaVerify(factor.id, challenge.id, code);
        if (verifyError) {
          showError('Incorrect code. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Verify';
          codeEl.value = '';
          codeEl.focus();
          return;
        }

        const params = new URLSearchParams(window.location.search);
        window.location.href = params.get('returnTo') || 'index.html';
      });
    })();
  </script>
</body>
</html>
