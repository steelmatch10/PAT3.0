<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAT 3.0 — Sign In</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .login-brand .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--brand), #89b4ff);
      box-shadow: 0 8px 20px rgba(110,168,254,.2);
      flex-shrink: 0;
    }
    .login-brand h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }
    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .form-group input {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      padding: 10px 12px;
      outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus {
      border-color: var(--brand);
    }
    .btn-primary {
      width: 100%;
      background: var(--brand);
      color: #0e1220;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      padding: 12px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .login-error {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px;
      color: #f87171;
      font-size: 14px;
      padding: 10px 12px;
      margin-top: 12px;
      display: none;
    }
    .login-error.visible { display: block; }
    .login-footer {
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }
    .login-footer a {
      color: var(--brand);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="logo"></div>
        <h1>PAT 3.0</h1>
      </div>
      <div class="login-title">Sign in</div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">Sign in</button>
        <div class="login-error" id="loginError"></div>
      </form>

      <div class="login-footer">
        <a href="#" id="forgotLink">Forgot password?</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-config.js"></script>
  <script>
    const _client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // If already signed in, skip login
    _client.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'index.html';
    });

    const form       = document.getElementById('loginForm');
    const emailEl    = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const submitBtn  = document.getElementById('submitBtn');
    const errorEl    = document.getElementById('loginError');
    const forgotLink = document.getElementById('forgotLink');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add('visible');
    }
    function clearError() {
      errorEl.classList.remove('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const email    = emailEl.value.trim();
      const password = passwordEl.value;
      if (!email || !password) { showError('Please enter your email and password.'); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      const { error } = await _client.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message || 'Sign-in failed. Check your credentials.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      } else {
        window.location.href = 'index.html';
      }
    });

    forgotLink.addEventListener('click', async (e) => {
      e.preventDefault();
      const email = emailEl.value.trim();
      if (!email) { showError('Enter your email address above, then click Forgot password.'); return; }
      clearError();
      const { error } = await _client.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/login.html',
      });
      if (error) {
        showError(error.message);
      } else {
        errorEl.style.background = 'rgba(34,197,94,.12)';
        errorEl.style.borderColor = 'rgba(34,197,94,.3)';
        errorEl.style.color = '#4ade80';
        showError('Password reset email sent. Check your inbox.');
      }
    });
  </script>
</body>
</html>
